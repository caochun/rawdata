notes:
- 域 crm：7 张表
- 域 customer_mgmt：12 张表
- 域 bidding：10 张表
- 域 contract：5 张表
- 域 hr：11 张表
- 域 ipasset：5 张表
- 域 project：4 张表
- 域 purchase：4 张表
- customer_mgmt 各表通过 customer_id/contact_id 关联 crm 域的 customer/contact
- 主业务链：opportunity → bid_tender → contract → project
- project 是成本归集中心，purchase/ipasset/hr.emp_project 均可挂靠
