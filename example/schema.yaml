tables:
  contacts:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
      name:
        type: string
        required: true
      phone:
        type: string
        pattern: "^1[3-9]\\d{9}$"
      company:
        type: string
      status:
        type: enum
        values: [active, inactive, pending]
      created_at:
        type: datetime
        auto: true
    merge_strategy:
      status: last_write_wins
      phone: last_write_wins

  interactions:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
      contact_id:
        type: string
        required: true
      note:
        type: string
        required: true
      created_at:
        type: datetime
        auto: true
