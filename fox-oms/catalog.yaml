notes:
- 主业务链：customer/contact → opportunity → bid_pre_reg → bid_tender → contract → project
  → project_acceptance → contract_payment
- customer_partnership 存储合作伙伴专属字段（已从 customer 表拆出）
- 所有跨表引用均使用 uuid FK；string 型名称字段仅供展示/归档，以 _id FK 为准
- contract_payment 是回款核心表，与 contract_invoice 形成 invoice→payment 闭环
- project_team 同时记录当前分配与历史项目经历；project_id 为空表示外部/历史项目
- follow_up 同时承载商机跟进与客户跟进；opportunity_id 为空表示纯客户维度跟进
- bid_tender 的角色/原因/策略类字段统一维护在 bid_pre_reg，bid_tender 专注执行过程
- contract 和 project 不存聚合字段（已开票/已回款/成本合计等），查询时从明细表聚合
- ip_asset 合并原 ip_asset+ip_application 两阶段为单表，用 status 驱动生命周期（applying→authorized）；ip_author 合并原 ip_author+ip_app_author，phone/address 申请阶段使用
