notes:
- 主业务链：customer/contact → opportunity → bid_registration → bid_submission → contract → project
  → project_acceptance → contract_payment
- customer_partnership 存储合作伙伴专属字段（已从 customer 表拆出）
- 所有跨表引用均使用 uuid FK；string 型名称字段仅供展示/归档，以 _id FK 为准
- contract_payment 是回款核心表，与 contract_invoice 形成 invoice→payment 闭环
- project_member 同时记录当前分配与历史项目经历；project_id 为空表示外部/历史项目
- follow_up 同时承载商机跟进与客户跟进；opportunity_id 为空表示纯客户维度跟进
- bid_submission 的角色/原因/策略类字段统一维护在 bid_registration，bid_submission 专注执行过程
- contract 和 project 不存聚合字段（已开票/已回款/成本合计等），查询时从明细表聚合
- contract_payment_plan 只存计划期定义，实收款记录在 contract_payment（通过 payment_plan_id 关联计划期）；付款计划和发票均可通过
  sub_contract_id 归属到具体子合同
- company_financial 已删除（聚合字段，年度数据从 contract/contract_invoice/contract_payment 查询）
- bid_registration 只保留投标决策字段；发标单位的画像信息（注册资本/参保人数等）在 bid_research 里详细调研
- 不存储派生字段：contract(profit/tax/amount_tax_included/transfer_ratio)、purchase_order(amount_tax_included)、contract_line_item(amount)、bid_submission(win_price_ratio)、employee_salary_history(total_salary)、contact(last_contact_date)
  均已删除，查询时计算
- employee_qualification 合并原 emp_certificate+emp_training，用 qual_type 区分（certificate/training）
- bid_platform_account 合并原 customer_bid_site+bid_account，用 owner_type 区分（customer/issuer）
- bid_registration 吸收原 bid_pre_issuer 的招标单位确认字段；bid_submission 的 stage_*_at 派生字段已删除，从 bid_log
  查询
- contact 吸收原 contact_job_change（保留最近一次变动字段）和 contact_honor（折叠为 honors 文本），contact_relationship
  保留（自引用多对多）
- ip_asset 合并原 ip_asset+ip_application 两阶段为单表，用 status 驱动生命周期（applying→authorized）；ip_author
  合并原 ip_author+ip_app_author，phone/address 申请阶段使用
- 命名全面规范化：展开 emp_*/cust_ 缩写；bid_pre_reg→bid_registration、bid_tender→bid_submission、contract_sub→sub_contract
