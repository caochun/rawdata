twins:
  # ══════════════════════════════════════════════════════════
  # 合同管理 — Entity Twins
  # ══════════════════════════════════════════════════════════

  # 合同主体（含直签/转签两种性质）
  contract:
    label: "合同"
    type: entity
    state_stream:
      mode: versioned
    fields:
      # ── 基础信息 ──
      contract_no:
        label: "合同编号"
        type: string
        required: true
      name:
        label: "主合同名称"
        type: string
        required: true
      nature:
        label: "性质"
        type: enum
        options:
          - { value: direct, label: "直签" }
          - { value: transfer, label: "转签" }
        default_value: direct
      contract_type:
        label: "合同类型"
        type: enum
        options:
          - { value: tech, label: "科技" }
          - { value: service, label: "服务" }
          - { value: purchase, label: "采购" }
          - { value: consulting, label: "咨询" }
          - { value: other, label: "其他" }
      status:
        label: "合同状态"
        type: enum
        options:
          - { value: drafting, label: "拟稿中" }
          - { value: reviewing, label: "审核中" }
          - { value: signed, label: "已签订" }
          - { value: executing, label: "履行中" }
          - { value: completed, label: "已完结" }
          - { value: terminated, label: "已终止" }
          - { value: disputed, label: "争议中" }
        default_value: drafting
      dept:
        label: "事业部"
        type: string
      business_unit:
        label: "事业单位"
        type: string
      # ── 甲方信息 ──
      party_a_name:
        label: "甲方单位"
        type: string
        required: true
      party_a_contact:
        label: "甲方项目相关联系人"
        type: string
      party_a_phone:
        label: "甲方电话"
        type: string
      # ── 金额与税率 ──
      amount:
        label: "合同金额(万元)"
        type: decimal
      tax_rate:
        label: "税率(%)"
        type: number
      amount_tax_included:
        label: "含税金额(万元)"
        type: decimal
      tax_amount:
        label: "税额(万元)"
        type: decimal
      # ── 时间 ──
      sign_date:
        label: "签订日期"
        type: date
      effective_date:
        label: "生效日期"
        type: date
      end_date:
        label: "截止日期"
        type: date
      created_date:
        label: "创建日期"
        type: date
        auto: date
      # ── 付款方式 ──
      payment_method:
        label: "付款方式"
        type: enum
        options:
          - { value: lump_sum, label: "一次性" }
          - { value: installment, label: "分期" }
          - { value: milestone, label: "按里程碑" }
          - { value: monthly, label: "按月" }
      payment_terms:
        label: "付款条款说明"
        type: text
      # ── 关联信息 ──
      project_name:
        label: "关联内部项目"
        type: string
      opportunity_name:
        label: "关联商机"
        type: string
      bid_tender_name:
        label: "关联投标"
        type: string
      second_customer_name:
        label: "第二关联客户"
        type: string
      handler:
        label: "业务对接人"
        type: string
      internal_contact:
        label: "内部负责人"
        type: string
      # ── 转签专属（nature=transfer 时显示）──
      transfer_from_company:
        label: "中标单位(转出方)"
        type: string
      transfer_contract_no:
        label: "转出方合同编号"
        type: string
      transfer_amount:
        label: "转签金额(万元)"
        type: decimal
      transfer_ratio:
        label: "转签比例(%)"
        type: number
      transfer_status:
        label: "转出方合同进度"
        type: enum
        options:
          - { value: not_signed, label: "未签" }
          - { value: signed, label: "已签" }
          - { value: executing, label: "履行中" }
          - { value: completed, label: "已完结" }
      transfer_remark:
        label: "转签说明"
        type: text
      # ── 经营数据汇总 ──
      invoiced_amount:
        label: "已开票金额(万元)"
        type: decimal
      received_amount:
        label: "已到款金额(万元)"
        type: decimal
      profit_amount:
        label: "利润(万元)"
        type: decimal
      profit_rate:
        label: "利润率(%)"
        type: number
      # ── 备注 ──
      remark:
        label: "备注"
        type: text

  # ══════════════════════════════════════════════════════════
  # 合同管理 — Activity Twins
  # ══════════════════════════════════════════════════════════

  # 子合同
  contract_sub:
    label: "子合同"
    type: activity
    related_entities:
      - entity: contract
        key: contract_id
        label: "合同"
    state_stream:
      mode: versioned
    fields:
      sub_name:
        label: "子合同名称"
        type: string
        required: true
      sub_no:
        label: "子合同编号"
        type: string
      sub_amount:
        label: "金额(万元)"
        type: decimal
      sub_tax_rate:
        label: "税率(%)"
        type: number
      specialty:
        label: "专业类别"
        type: string
      specialty_ratio:
        label: "专业比例(%)"
        type: number
      handler:
        label: "负责人"
        type: string
      status:
        label: "状态"
        type: enum
        options:
          - { value: active, label: "生效" }
          - { value: completed, label: "已完结" }
          - { value: terminated, label: "已终止" }
        default_value: active
      remark:
        label: "备注"
        type: text

  # 付款计划
  contract_payment_plan:
    label: "付款计划"
    type: activity
    related_entities:
      - entity: contract
        key: contract_id
        label: "合同"
    state_stream:
      mode: versioned
    fields:
      period_no:
        label: "期数"
        type: number
        required: true
      plan_amount:
        label: "计划金额(万元)"
        type: decimal
        required: true
      plan_ratio:
        label: "比例(%)"
        type: number
      plan_date:
        label: "计划付款日期"
        type: date
      condition:
        label: "付款条件"
        type: string
      status:
        label: "状态"
        type: enum
        options:
          - { value: pending, label: "待付" }
          - { value: partial, label: "部分到款" }
          - { value: paid, label: "已到款" }
        default_value: pending
      actual_amount:
        label: "实际到款(万元)"
        type: decimal
      actual_date:
        label: "实际到款日期"
        type: date
      remark:
        label: "备注"
        type: text

  # 开票记录
  contract_invoice:
    label: "开票记录"
    type: activity
    related_entities:
      - entity: contract
        key: contract_id
        label: "合同"
    state_stream:
      mode: versioned
    fields:
      invoice_no:
        label: "发票号码"
        type: string
        required: true
      invoice_type:
        label: "发票类型"
        type: enum
        options:
          - { value: special_vat, label: "增值税专票" }
          - { value: normal_vat, label: "增值税普票" }
          - { value: electronic, label: "电子发票" }
      invoice_amount:
        label: "开票金额(万元)"
        type: decimal
        required: true
      invoice_date:
        label: "开票日期"
        type: date
      tax_rate:
        label: "税率(%)"
        type: number
      receiver:
        label: "接收方"
        type: string
      status:
        label: "状态"
        type: enum
        options:
          - { value: issued, label: "已开" }
          - { value: delivered, label: "已寄" }
          - { value: confirmed, label: "已确认" }
          - { value: voided, label: "已作废" }
        default_value: issued
      remark:
        label: "备注"
        type: text

  # 合同变更/补充协议
  contract_change:
    label: "合同变更"
    type: activity
    related_entities:
      - entity: contract
        key: contract_id
        label: "合同"
    state_stream:
      mode: versioned
    fields:
      change_type:
        label: "变更类型"
        type: enum
        options:
          - { value: supplement, label: "补充协议" }
          - { value: amendment, label: "条款变更" }
          - { value: extension, label: "延期" }
          - { value: amount_change, label: "金额变更" }
          - { value: termination, label: "终止" }
      change_no:
        label: "变更编号"
        type: string
      change_date:
        label: "变更日期"
        type: date
        required: true
      description:
        label: "变更内容"
        type: text
        required: true
      old_amount:
        label: "变更前金额(万元)"
        type: decimal
      new_amount:
        label: "变更后金额(万元)"
        type: decimal
      old_end_date:
        label: "变更前截止日期"
        type: date
      new_end_date:
        label: "变更后截止日期"
        type: date
      approval_by:
        label: "审批人"
        type: string
      status:
        label: "状态"
        type: enum
        options:
          - { value: pending, label: "待审批" }
          - { value: approved, label: "已批准" }
          - { value: rejected, label: "已驳回" }
        default_value: pending
      remark:
        label: "备注"
        type: text
