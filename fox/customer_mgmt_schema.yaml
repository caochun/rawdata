# ══════════════════════════════════════════════════════════════════
# 客商管理扩展模型 — 源自 foxplan-sw 客商管理模块
#
# 包含：组织架构、跟进记录、岗位变动、荣誉培训、
#       社会关系、财务汇总、开票信息、招标信息、
#       RFM客户价值分析、信息变更日志
# ══════════════════════════════════════════════════════════════════

twins:

  # ─────────────────────────────────────────────────────────────
  # Entity Twins
  # ─────────────────────────────────────────────────────────────

  # 企业组织架构 — 客户内部的部门/岗位树形结构
  # 融合 foxplan 树形部门 + 岗位管理 + 规模/状态管理
  cust_department:
    label: "客户组织架构"
    type: entity
    state_stream:
      mode: versioned
    fields:
      # ── 归属与层级 ──
      customer_name:
        label: "所属客户"
        type: string
        required: true
      name:
        label: "部门名称"
        type: string
        required: true
      parent_dept_name:
        label: "上级部门"
        type: string
      dept_level:
        label: "部门层级"
        type: enum
        options:
          - { value: "1", label: "一级部门" }
          - { value: "2", label: "二级部门" }
          - { value: "3", label: "三级部门" }
          - { value: "4", label: "四级部门" }
      dept_type:
        label: "部门类型"
        type: enum
        options:
          - { value: business, label: "业务部门" }
          - { value: tech, label: "技术部门" }
          - { value: admin, label: "行政职能" }
          - { value: finance, label: "财务部门" }
          - { value: purchase, label: "采购部门" }
          - { value: quality, label: "质量部门" }
          - { value: other, label: "其他" }
      # ── 部门信息 ──
      leader_name:
        label: "部门负责人"
        type: string
      leader_title:
        label: "负责人职务"
        type: string
      phone:
        label: "部门电话"
        type: string
      headcount:
        label: "人员规模"
        type: enum
        options:
          - { value: small, label: "10人以下" }
          - { value: medium, label: "10-50人" }
          - { value: large, label: "50-200人" }
          - { value: xlarge, label: "200人以上" }
      responsibilities:
        label: "部门职责"
        type: text
      # ── 岗位信息（该部门关键岗位）──
      position_name:
        label: "关键岗位"
        type: string
      position_desc:
        label: "岗位描述"
        type: text
      position_permission:
        label: "岗位权限/审批权"
        type: text
      # ── 状态 ──
      status:
        label: "状态"
        type: enum
        options:
          - { value: active, label: "正常" }
          - { value: restructured, label: "重组中" }
          - { value: dissolved, label: "已撤销" }
        default_value: active
      sort_order:
        label: "排序"
        type: number
      remark:
        label: "备注"
        type: text

  # ─────────────────────────────────────────────────────────────
  # Activity Twins
  # ─────────────────────────────────────────────────────────────

  # 客户跟进记录 — 针对客户的沟通互动（区别于商机跟进）
  customer_follow_up:
    label: "客户跟进"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
      - entity: contact
        key: contact_id
        label: "联系人"
    state_stream:
      mode: versioned
    fields:
      method:
        label: "跟进方式"
        type: enum
        options:
          - { value: phone, label: "电话" }
          - { value: meeting, label: "面谈" }
          - { value: wechat, label: "微信" }
          - { value: email, label: "邮件" }
          - { value: visit, label: "上门拜访" }
          - { value: dinner, label: "商务宴请" }
          - { value: other, label: "其他" }
        default_value: phone
      content:
        label: "跟进内容"
        type: text
        required: true
      next_plan:
        label: "后续计划"
        type: text
      next_plan_date:
        label: "下次跟进日期"
        type: date
      amount:
        label: "合作金额(万元)"
        type: decimal
      follow_date:
        label: "跟进日期"
        type: date
        auto: date
      recorder:
        label: "记录人"
        type: string

  # 联系人岗位变动记录
  contact_job_change:
    label: "岗位变动"
    type: activity
    related_entities:
      - entity: contact
        key: contact_id
        label: "联系人"
    state_stream:
      mode: versioned
    fields:
      old_department:
        label: "原部门"
        type: string
      old_position:
        label: "原岗位"
        type: string
      new_department:
        label: "新部门"
        type: string
      new_position:
        label: "新岗位"
        type: string
      change_date:
        label: "变动日期"
        type: date
      reason:
        label: "变动原因"
        type: enum
        options:
          - { value: promotion, label: "晋升" }
          - { value: transfer, label: "调岗" }
          - { value: career_change, label: "转岗" }
          - { value: demotion, label: "降职" }
          - { value: other, label: "其他" }
      info_source:
        label: "信息来源"
        type: enum
        options:
          - { value: customer_told, label: "客户告知" }
          - { value: announcement, label: "企业公告" }
          - { value: other, label: "其他" }
      remark:
        label: "备注"
        type: text

  # 联系人荣誉/培训记录
  contact_honor:
    label: "荣誉培训"
    type: activity
    related_entities:
      - entity: contact
        key: contact_id
        label: "联系人"
    state_stream:
      mode: versioned
    fields:
      record_type:
        label: "类型"
        type: enum
        options:
          - { value: honor, label: "荣誉" }
          - { value: training, label: "培训" }
      content:
        label: "荣誉/培训名称"
        type: string
        required: true
      date:
        label: "日期"
        type: date
      issuer:
        label: "颁发/主办机构"
        type: string
      remark:
        label: "备注"
        type: text

  # 联系人社会关系
  contact_relation:
    label: "社会关系"
    type: activity
    related_entities:
      - entity: contact
        key: contact_id
        label: "联系人"
      - entity: contact
        key: related_contact_id
        label: "关联联系人"
    state_stream:
      mode: versioned
    fields:
      relation_type:
        label: "关系类型"
        type: enum
        options:
          - { value: classmate, label: "同学" }
          - { value: relative, label: "亲友" }
          - { value: colleague, label: "同事" }
          - { value: upstream_downstream, label: "上下游客户" }
          - { value: other, label: "其他" }
      description:
        label: "关系描述"
        type: text

  # 企业财务数据汇总
  company_financial:
    label: "财务汇总"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: time_series
      unique_key: period
    fields:
      period:
        label: "统计期"
        type: string
        required: true
      contract_amount:
        label: "合约金额(万元)"
        type: decimal
      invoiced_amount:
        label: "已开票金额(万元)"
        type: decimal
      received_amount:
        label: "已回款金额(万元)"
        type: decimal
      first_cooperation_year:
        label: "首次合作年度"
        type: number
      remark:
        label: "备注"
        type: text

  # 开票信息（支持历史变更 + 生效区间）
  customer_invoice_info:
    label: "开票信息"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: versioned
    fields:
      invoice_title:
        label: "开票抬头"
        type: string
        required: true
      tax_id:
        label: "纳税人识别号"
        type: string
        required: true
      bank_name:
        label: "开户行"
        type: string
      bank_account:
        label: "银行账号"
        type: string
      address:
        label: "注册地址"
        type: string
      phone:
        label: "开票电话"
        type: string
      vat_type:
        label: "纳税人类型"
        type: enum
        options:
          - { value: general, label: "一般纳税人" }
          - { value: small_scale, label: "小规模纳税人" }
        default_value: general
      effective_from:
        label: "生效日期"
        type: date
      effective_to:
        label: "失效日期"
        type: date
      is_current:
        label: "当前使用"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "yes"
      remark:
        label: "变更原因/备注"
        type: text

  # 客户投标网站 — 客户（发标单位）使用的投标平台，含变更历史与有效期
  # 未来与 bidding_schema 的 bid_account / bid_tender 联动
  customer_bid_site:
    label: "投标网站"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: versioned
    fields:
      platform_name:
        label: "平台名称"
        type: string
        required: true
      platform_url:
        label: "投标网址"
        type: string
        required: true
      account_no:
        label: "账号"
        type: string
      security_method:
        label: "安全认证方式"
        type: enum
        options:
          - { value: ca, label: "CA证书" }
          - { value: ukey, label: "U-Key" }
          - { value: password, label: "账号密码" }
          - { value: other, label: "其他" }
      effective_from:
        label: "生效日期"
        type: date
        required: true
      effective_to:
        label: "失效日期"
        type: date
      is_current:
        label: "当前使用"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "yes"
      change_reason:
        label: "变更原因"
        type: enum
        options:
          - { value: new, label: "新增" }
          - { value: platform_change, label: "平台迁移" }
          - { value: url_change, label: "网址变更" }
          - { value: expired, label: "平台停用" }
          - { value: other, label: "其他" }
        default_value: new
      manager_name:
        label: "管理人员"
        type: string
      remark:
        label: "备注"
        type: text

  # 招标信息记录
  tender_record:
    label: "招标信息"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: versioned
    fields:
      year:
        label: "年度"
        type: number
        required: true
      batch_no:
        label: "批次号"
        type: string
      tender_date:
        label: "招标发布时间"
        type: date
      deadline_date:
        label: "截止时间"
        type: date
      content:
        label: "招标内容/项目名称"
        type: string
        required: true
      amount:
        label: "预算金额(万元)"
        type: decimal
      website:
        label: "招标网站链接"
        type: string
      status:
        label: "状态"
        type: enum
        options:
          - { value: planned, label: "计划中" }
          - { value: published, label: "已发布" }
          - { value: closed, label: "已截止" }
          - { value: awarded, label: "已定标" }
        default_value: planned
      winner:
        label: "中标方"
        type: string
      remark:
        label: "备注"
        type: text

  # RFM 客户价值分析（按周期计算的时间序列）
  rfm_score:
    label: "客户价值分析"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: time_series
      unique_key: calculated_date
    fields:
      calculated_date:
        label: "计算日期"
        type: date
        required: true
        auto: date
      last_follow_date:
        label: "最近跟进时间"
        type: date
      follow_count:
        label: "合作频次"
        type: number
      total_amount:
        label: "累计合作金额(万元)"
        type: decimal
      r_score:
        label: "R-最近一次(1-5)"
        type: number
      f_score:
        label: "F-频率(1-5)"
        type: number
      m_score:
        label: "M-金额(1-5)"
        type: number
      total_score:
        label: "总分"
        type: number
      level:
        label: "客户等级"
        type: enum
        options:
          - { value: high_value, label: "高价值客户" }
          - { value: active, label: "活跃客户" }
          - { value: potential, label: "潜力客户" }
          - { value: lost, label: "流失客户" }
          - { value: general, label: "一般客户" }

  # 客户信息变更日志
  company_change_log:
    label: "变更日志"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: versioned
    fields:
      field_name:
        label: "变更字段"
        type: string
        required: true
      old_value:
        label: "原值"
        type: text
      new_value:
        label: "新值"
        type: text
      info_source:
        label: "信息来源"
        type: string
      recorder:
        label: "记录人"
        type: string
      changed_date:
        label: "变更时间"
        type: date
        auto: date

  # 企业更名记录（含变更函附件）
  company_name_change:
    label: "企业更名记录"
    type: activity
    related_entities:
      - entity: customer
        key: customer_id
        label: "客户"
    state_stream:
      mode: versioned
    fields:
      old_name:
        label: "原企业名称"
        type: string
        required: true
      new_name:
        label: "新企业名称"
        type: string
        required: true
      change_date:
        label: "变更日期"
        type: date
        required: true
      change_reason:
        label: "变更原因"
        type: text
      document_url:
        label: "变更函附件"
        type: string
      document_name:
        label: "附件文件名"
        type: string
      effective_date:
        label: "生效日期"
        type: date
      registration_update:
        label: "工商变更状态"
        type: enum
        options:
          - { value: completed, label: "已完成" }
          - { value: pending, label: "办理中" }
          - { value: not_started, label: "未办理" }
        default_value: not_started
      contract_update_status:
        label: "合同更名状态"
        type: enum
        options:
          - { value: all_updated, label: "全部已更新" }
          - { value: partial, label: "部分更新" }
          - { value: not_started, label: "未开始" }
        default_value: not_started
      remark:
        label: "备注"
        type: text
      recorder:
        label: "记录人"
        type: string
