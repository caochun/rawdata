twins:
  # ══════════════════════════════════════════════════════════
  # 人事管理 — Entity Twins
  # ══════════════════════════════════════════════════════════

  # 组织架构 — 部门（对应 foxplan OrgDepartment）
  department:
    label: "部门"
    type: entity
    state_stream:
      mode: versioned
    fields:
      name:
        label: "部门名称"
        type: string
        required: true
      dept_code:
        label: "部门编码"
        type: string
      dept_type:
        label: "部门类型"
        type: enum
        options:
          - { value: business_unit, label: "事业部" }
          - { value: functional, label: "职能部" }
          - { value: branch, label: "分公司" }
          - { value: project, label: "总经理室 " }
          - { value: office, label: "办公室" }
          - { value: other, label: "其他" }
      parent_name:
        label: "上级部门"
        type: string
      leader_name:
        label: "负责人"
        type: string
      establish_date:
        label: "成立日期"
        type: date
      sort_order:
        label: "排序"
        type: number
      status:
        label: "状态"
        type: enum
        options:
          - { value: active, label: "启用" }
          - { value: inactive, label: "停用" }
        default_value: active
      responsibilities:
        label: "部门职责"
        type: text
      remark:
        label: "备注"
        type: text

  # 员工（对应 foxplan Employee）
  employee:
    label: "员工"
    type: entity
    state_stream:
      mode: versioned
    fields:
      name:
        label: "姓名"
        type: string
        required: true
      emp_number:
        label: "员工编号"
        type: string
      gender:
        label: "性别"
        type: enum
        options:
          - { value: male, label: "男" }
          - { value: female, label: "女" }
      id_card_no:
        label: "身份证号"
        type: string
      phone:
        label: "手机"
        type: string
      email:
        label: "邮箱"
        type: string
      department_name:
        label: "所属部门"
        type: string
      position:
        label: "岗位"
        type: string
      rank:
        label: "职级"
        type: string
      employment_status:
        label: "在职状态"
        type: enum
        options:
          - { value: probation, label: "试用" }
          - { value: active, label: "在职" }
          - { value: resigned, label: "离职" }
          - { value: leave_without_pay, label: "停薪留职" }
        default_value: probation
      hire_date:
        label: "入职日期"
        type: date
      probation_end_date:
        label: "试用期截止"
        type: date
      regularization_date:
        label: "转正日期"
        type: date
      contract_end_date:
        label: "合同到期"
        type: date
      resignation_date:
        label: "离职日期"
        type: date
      emergency_contact:
        label: "紧急联系人"
        type: string
      emergency_phone:
        label: "紧急联系电话"
        type: string
      # ── 个人信息 ──
      birthday:
        label: "生日"
        type: date
      native_place:
        label: "籍贯"
        type: string
      ethnicity:
        label: "民族"
        type: string
      political_status:
        label: "政治面貌"
        type: string
      marital_status:
        label: "婚姻状况"
        type: string
      blood_type:
        label: "血型"
        type: string
      zodiac:
        label: "星座"
        type: string
      hobbies:
        label: "爱好"
        type: text
      specialties:
        label: "特长"
        type: text
      remark:
        label: "备注"
        type: text

  # ══════════════════════════════════════════════════════════
  # 人事管理 — Activity Twins
  # ══════════════════════════════════════════════════════════

  # 教育经历（对应 foxplan EmpEducation）
  emp_education:
    label: "教育经历"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      start_date:
        label: "起始时间"
        type: date
      end_date:
        label: "结束时间"
        type: date
      school:
        label: "学校"
        type: string
        required: true
      major:
        label: "专业"
        type: string
      study_mode:
        label: "学习形式"
        type: enum
        options:
          - { value: full_time, label: "全日制" }
          - { value: part_time, label: "非全日制" }
          - { value: self_taught, label: "自考" }
          - { value: correspondence, label: "函授" }
          - { value: online, label: "网络教育" }
        default_value: full_time
      degree:
        label: "学历"
        type: enum
        options:
          - { value: high_school, label: "高中" }
          - { value: college, label: "大专" }
          - { value: bachelor, label: "本科" }
          - { value: master, label: "硕士" }
          - { value: doctor, label: "博士" }
      is_highest:
        label: "最高学历"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
      remark:
        label: "备注"
        type: text

  # 工作经历（对应 foxplan EmpWorkHistory）
  emp_work_history:
    label: "工作经历"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      company_name:
        label: "公司名称"
        type: string
        required: true
      position:
        label: "担任职务"
        type: string
      start_date:
        label: "入职时间"
        type: date
      end_date:
        label: "离职时间"
        type: date
      leave_reason:
        label: "离职原因"
        type: string
      remark:
        label: "备注"
        type: text

  # 岗位调动（对应 foxplan EmpTransfer）
  emp_transfer:
    label: "岗位调动"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      change_type:
        label: "变动类型"
        type: enum
        options:
          - { value: hire, label: "入职" }
          - { value: regularize, label: "转正" }
          - { value: transfer, label: "调岗" }
          - { value: promote, label: "晋升" }
          - { value: demote, label: "降级" }
          - { value: resign, label: "离职" }
        required: true
      change_date:
        label: "变动日期"
        type: date
        required: true
      old_department:
        label: "原部门"
        type: string
      old_position:
        label: "原岗位"
        type: string
      old_rank:
        label: "原职级"
        type: string
      new_department:
        label: "新部门"
        type: string
      new_position:
        label: "新岗位"
        type: string
      new_rank:
        label: "新职级"
        type: string
      reason:
        label: "原因"
        type: text
      approval_by:
        label: "审批人"
        type: string
      remark:
        label: "备注"
        type: text

  # 员工证照（对应 foxplan EmpCertificate）
  emp_certificate:
    label: "员工证照"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      cert_name:
        label: "证照名称"
        type: string
        required: true
      cert_type:
        label: "证照类型"
        type: enum
        options:
          - { value: id_card, label: "身份证" }
          - { value: diploma, label: "毕业证" }
          - { value: degree, label: "学位证" }
          - { value: professional, label: "职业资格证" }
          - { value: title, label: "职称证" }
          - { value: driving, label: "驾驶证" }
          - { value: other, label: "其他" }
      cert_no:
        label: "证照编号"
        type: string
      issuing_authority:
        label: "发证机关"
        type: string
      issue_date:
        label: "发证日期"
        type: date
      expiry_date:
        label: "有效期至"
        type: date
      remark:
        label: "备注"
        type: text

  # 培训记录
  emp_training:
    label: "培训记录"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      training_name:
        label: "培训名称"
        type: string
        required: true
      training_type:
        label: "培训类型"
        type: enum
        options:
          - { value: internal, label: "内训" }
          - { value: external, label: "外训" }
          - { value: online, label: "在线" }
          - { value: certification, label: "认证考试" }
      organizer:
        label: "主办方"
        type: string
      start_date:
        label: "开始日期"
        type: date
      end_date:
        label: "结束日期"
        type: date
      hours:
        label: "学时"
        type: number
      result:
        label: "结果"
        type: enum
        options:
          - { value: pass, label: "合格" }
          - { value: excellent, label: "优秀" }
          - { value: fail, label: "不合格" }
      cert_obtained:
        label: "是否获证"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "no"
      remark:
        label: "备注"
        type: text

  # 奖惩记录
  emp_award:
    label: "奖惩记录"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      record_type:
        label: "类型"
        type: enum
        options:
          - { value: award, label: "奖励" }
          - { value: penalty, label: "处罚" }
        required: true
      title:
        label: "名称"
        type: string
        required: true
      level:
        label: "级别"
        type: enum
        options:
          - { value: company, label: "公司级" }
          - { value: department, label: "部门级" }
          - { value: project, label: "项目级" }
      date:
        label: "日期"
        type: date
      issuer:
        label: "颁发/执行部门"
        type: string
      amount:
        label: "奖金/罚款金额(元)"
        type: decimal
      reason:
        label: "原因"
        type: text
      remark:
        label: "备注"
        type: text

  # 项目经历
  emp_project:
    label: "项目经历"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      project_name:
        label: "项目名称"
        type: string
        required: true
      role:
        label: "项目角色"
        type: string
      start_date:
        label: "开始日期"
        type: date
      end_date:
        label: "结束日期"
        type: date
      customer_name:
        label: "客户名称"
        type: string
      project_amount:
        label: "项目金额(万元)"
        type: decimal
      responsibility:
        label: "职责描述"
        type: text
      achievement:
        label: "成果/业绩"
        type: text
      remark:
        label: "备注"
        type: text

  # 薪资变动
  emp_salary:
    label: "薪资变动"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      change_type:
        label: "变动类型"
        type: enum
        options:
          - { value: initial, label: "入职定薪" }
          - { value: adjust, label: "调薪" }
          - { value: promote, label: "晋升调薪" }
          - { value: annual, label: "年度调薪" }
          - { value: decrease, label: "降薪" }
        required: true
      effective_date:
        label: "生效日期"
        type: date
        required: true
      base_salary:
        label: "基本工资(元)"
        type: decimal
      performance_ratio:
        label: "绩效系数"
        type: decimal
      allowance:
        label: "补贴(元)"
        type: decimal
      total_salary:
        label: "月薪合计(元)"
        type: decimal
      reason:
        label: "变动原因"
        type: text
      approval_by:
        label: "审批人"
        type: string
      remark:
        label: "备注"
        type: text

  # 合同记录
  emp_contract:
    label: "合同记录"
    type: activity
    related_entities:
      - entity: employee
        key: employee_id
        label: "员工"
    state_stream:
      mode: versioned
    fields:
      contract_no:
        label: "合同编号"
        type: string
        required: true
      contract_type:
        label: "合同类型"
        type: enum
        options:
          - { value: fixed, label: "固定期限" }
          - { value: permanent, label: "无固定期限" }
          - { value: intern, label: "实习" }
          - { value: labor, label: "劳务" }
          - { value: rehire, label: "返聘" }
        required: true
      start_date:
        label: "开始日期"
        type: date
      end_date:
        label: "结束日期"
        type: date
      sign_date:
        label: "签订日期"
        type: date
      status:
        label: "状态"
        type: enum
        options:
          - { value: active, label: "生效中" }
          - { value: expired, label: "已到期" }
          - { value: terminated, label: "已终止" }
          - { value: renewed, label: "已续签" }
        default_value: active
      termination_reason:
        label: "终止原因"
        type: text
      remark:
        label: "备注"
        type: text