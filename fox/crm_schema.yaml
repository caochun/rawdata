twins:
  # ══════════════════════════════════════════════════════════
  # Entity Twins
  # ══════════════════════════════════════════════════════════

  customer:
    label: "客户"
    type: entity
    state_stream:
      mode: versioned
    fields:
      # ── 核心信息（优先展示）──
      name:
        label: "企业名称"
        type: string
        required: true
      industry:
        label: "所属行业"
        type: enum
        options:
          - { value: tech, label: "科技/互联网" }
          - { value: finance, label: "金融" }
          - { value: manufacturing, label: "制造业" }
          - { value: retail, label: "零售" }
          - { value: healthcare, label: "医疗健康" }
          - { value: education, label: "教育" }
          - { value: government, label: "政府/公共事业" }
          - { value: energy, label: "能源" }
          - { value: other, label: "其他" }
      website:
        label: "官网"
        type: string
      bid_website:
        label: "招标官网"
        type: string
      customer_level:
        label: "客户等级"
        type: enum
        options:
          - { value: strategic, label: "战略客户" }
          - { value: key, label: "重点客户" }
          - { value: normal, label: "普通客户" }
          - { value: potential, label: "潜力客户" }
        default_value: normal
      customer_source:
        label: "客户来源"
        type: enum
        options:
          - { value: exhibition, label: "客户推荐" }
          - { value: referral, label: "上级指定" }
          - { value: online, label: "线上推广" }
          - { value: cold_call, label: "电话开发" }
          - { value: self_developed, label: "自主开发" }
          - { value: tender, label: "招投标" }
          - { value: other, label: "其他" }
      # ── 基础信息 ──
      short_name:
        label: "企业简称"
        type: string
      company_type:
        label: "企业角色"
        type: enum
        options:
          - { value: customer, label: "客户" }
          - { value: supplier, label: "供应商" }
          - { value: partner, label: "合作伙伴" }
          - { value: self, label: "我司" }
          - { value: user, label: "用户" }
          - { value: other, label: "其他" }
      tags:
        label: "标签"
        type: string
      size:
        label: "企业规模"
        type: enum
        options:
          - { value: lt50, label: "50人以下" }
          - { value: 50to100, label: "50-100人" }
          - { value: 100to500, label: "100-500人" }
          - { value: 500to1000, label: "500-1000人" }
          - { value: gt1000, label: "1000人以上" }
      address:
        label: "企业地址"
        type: string
      legal_person:
        label: "法人姓名"
        type: string
      registered_capital:
        label: "注册资金"
        type: string
      established_date:
        label: "成立时间"
        type: date
      credit_grade:
        label: "信用等级"
        type: enum
        options:
          - { value: A, label: "A级" }
          - { value: B, label: "B级" }
          - { value: C, label: "C级" }
          - { value: D, label: "D级" }
      multi_category:
        label: "多级分类"
        type: string
      parent_company_name:
        label: "上级客户"
        type: string
      # ── 工商详细信息 ──
      unified_social_credit_code:
        label: "统一社会信用代码"
        type: string
      registration_status:
        label: "登记状态"
        type: enum
        options:
          - { value: active, label: "在业" }
          - { value: cancelled, label: "注销" }
          - { value: relocated, label: "迁出" }
          - { value: revoked, label: "吊销" }
      paid_in_capital:
        label: "实缴资本"
        type: string
      org_code:
        label: "组织机构代码"
        type: string
      business_reg_no:
        label: "工商注册号"
        type: string
      taxpayer_id:
        label: "纳税人识别号"
        type: string
      enterprise_type:
        label: "企业类型"
        type: string
      business_term:
        label: "营业期限"
        type: string
      taxpayer_qualification:
        label: "纳税人资质"
        type: string
      insured_count:
        label: "参保人数"
        type: number
      region:
        label: "所属地区"
        type: string
      registration_authority:
        label: "登记机关"
        type: string
      english_name:
        label: "英文名"
        type: string
      former_names:
        label: "曾用名"
        type: string
      # ── 客户专属字段 ──
      customer_category:
        label: "客户分类"
        type: enum
        options:
          - { value: strategic, label: "战略客户" }
          - { value: major, label: "大客户" }
          - { value: normal, label: "普通客户" }
          - { value: potential, label: "潜在客户" }
      customer_importance:
        label: "重要性"
        type: enum
        options:
          - { value: high, label: "高" }
          - { value: medium, label: "中" }
          - { value: low, label: "低" }
      credit_limit:
        label: "信用额度(万元)"
        type: decimal
      settlement_method:
        label: "结算方式"
        type: enum
        options:
          - { value: monthly_30, label: "月结30天" }
          - { value: monthly_60, label: "月结60天" }
          - { value: prepaid, label: "预付款" }
          - { value: cod, label: "货到付款" }
      first_contact_date:
        label: "首次接触时间"
        type: date
      # ── 合作伙伴专属字段 ──
      partner_type:
        label: "合作类型"
        type: enum
        options:
          - { value: supplier, label: "供应商" }
          - { value: channel, label: "渠道商" }
          - { value: service, label: "服务商" }
          - { value: consultant, label: "咨询机构" }
      cooperation_level:
        label: "合作等级"
        type: enum
        options:
          - { value: strategic, label: "战略合作伙伴" }
          - { value: core, label: "核心伙伴" }
          - { value: normal, label: "普通伙伴" }
      partner_relation_type:
        label: "合作关系"
        type: enum
        options:
          - { value: long_term, label: "长期友好" }
          - { value: occasional, label: "偶尔" }
          - { value: normal, label: "一般" }
      can_accompany_bid:
        label: "可陪标"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "no"
      partner_referrer:
        label: "推荐人"
        type: string
      first_cooperation_date:
        label: "首次合作时间"
        type: date
      note:
        label: "备注"
        type: text

  contact:
    label: "联系人"
    type: entity
    state_stream:
      mode: versioned
    fields:
      # ── 基本信息 ──
      name:
        label: "姓名"
        type: string
        required: true
      gender:
        label: "性别"
        type: enum
        options:
          - { value: male, label: "男" }
          - { value: female, label: "女" }
      company:
        label: "所属公司"
        type: string
      department:
        label: "部门"
        type: string
      # ── 联系方式 ──
      phone:
        label: "固定电话"
        type: string
      mobile:
        label: "手机"
        type: string
      wechat:
        label: "微信号"
        type: string
      qq:
        label: "QQ"
        type: string
      email:
        label: "邮箱"
        type: string
      address:
        label: "通讯地址"
        type: string
      # ── 职务信息 ──
      position:
        label: "岗位"
        type: string
      title:
        label: "职务头衔"
        type: string
      decision_role:
        label: "决策角色"
        type: enum
        options:
          - { value: final, label: "最终决策者" }
          - { value: tech, label: "技术评估人" }
          - { value: purchase, label: "采购执行人" }
          - { value: influencer, label: "影响者" }
          - { value: gatekeeper, label: "信息把关人" }
          - { value: other, label: "其他" }
      influence_scope:
        label: "影响范围"
        type: string
      contact_priority:
        label: "对接优先级"
        type: enum
        options:
          - { value: "1", label: "高" }
          - { value: "2", label: "中" }
          - { value: "3", label: "低" }
        default_value: "3"
      relationship_level:
        label: "亲密度"
        type: enum
        options:
          - { value: stranger, label: "陌生" }
          - { value: acquaintance, label: "初识" }
          - { value: familiar, label: "熟悉" }
          - { value: deep, label: "深度合作" }
        default_value: stranger
      # ── 个人画像（关系维护用）──
      birthday:
        label: "生日"
        type: date
      native_place:
        label: "籍贯"
        type: string
      party_member:
        label: "党员"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "no"
      university:
        label: "毕业院校"
        type: string
      major:
        label: "专业"
        type: string
      hobbies:
        label: "兴趣爱好"
        type: string
      lifestyle:
        label: "生活习惯"
        type: string
      family_info:
        label: "家庭情况"
        type: text
      # ── 商务属性 ──
      attitude:
        label: "合作态度"
        type: enum
        options:
          - { value: supportive, label: "支持" }
          - { value: neutral, label: "中立" }
          - { value: opposed, label: "反对" }
          - { value: unknown, label: "未知" }
        default_value: unknown
      preferred_contact_method:
        label: "偏好联络方式"
        type: enum
        options:
          - { value: phone, label: "电话" }
          - { value: wechat, label: "微信" }
          - { value: email, label: "邮件" }
          - { value: visit, label: "当面拜访" }
      last_contact_date:
        label: "最近联络日期"
        type: date
      # ── 状态 ──
      status:
        label: "状态"
        type: enum
        options:
          - { value: active, label: "使用中" }
          - { value: left, label: "已离职" }
          - { value: inactive, label: "失效" }
        default_value: active
      tags:
        label: "标签"
        type: string
      note:
        label: "备注"
        type: text

  product:
    label: "产品"
    type: entity
    state_stream:
      mode: versioned
    fields:
      name:
        label: "产品名称"
        type: string
        required: true
      category:
        label: "分类"
        type: enum
        options:
          - { value: software, label: "软件产品" }
          - { value: service, label: "服务" }
          - { value: hardware, label: "硬件" }
          - { value: solution, label: "解决方案" }
      price:
        label: "标准单价(万元)"
        type: decimal
      description:
        label: "产品描述"
        type: text

  # ══════════════════════════════════════════════════════════
  # 商机 — 核心业务对象（Entity Twin）
  # 版本化状态流：每次阶段推进/信息更新自动生成新版本
  # 天然替代 SalesStageLog，完整保留变更历史
  # 作为 Entity 使得 follow_up 可通过 related_entities 关联
  # ══════════════════════════════════════════════════════════

  opportunity:
    label: "商机"
    type: entity
    state_stream:
      mode: versioned
    fields:
      title:
        label: "商机名称"
        type: string
        required: true
      customer_name:
        label: "客户名称"
        type: string
      contact_name:
        label: "客户对接人"
        type: string
      amount:
        label: "预计金额(万元)"
        type: decimal
      stage:
        label: "销售阶段"
        type: enum
        options:
          - { value: L6, label: "L6-初步线索，待交流" }
          - { value: L5, label: "L5-方案交流，可研确认" }
          - { value: L4, label: "L4-待立项预算基本明确" }
          - { value: L3, label: "L3-已完成可研，待立项" }
          - { value: L2, label: "L2-已投标，待结果" }
          - { value: L1, label: "L1-已中标，待签约" }
          - { value: L0, label: "L0-已签约" }
        default_value: L6
      status:
        label: "状态"
        type: enum
        options:
          - { value: tracking, label: "跟踪" }
          - { value: won, label: "成功" }
          - { value: lost, label: "失败" }
          - { value: hold, label: "搁置" }
          - { value: expired, label: "失效" }
        default_value: tracking
      win_prob:
        label: "赢单概率(%)"
        type: number
      source:
        label: "商机来源"
        type: enum
        options:
          - { value: marketing, label: "市场活动" }
          - { value: referral, label: "客户介绍" }
          - { value: self_developed, label: "自主开发" }
          - { value: tender, label: "招投标" }
          - { value: other, label: "其他" }
      priority:
        label: "优先级"
        type: enum
        options:
          - { value: high, label: "高" }
          - { value: medium, label: "中" }
          - { value: low, label: "低" }
        default_value: medium
      sales_person:
        label: "负责人"
        type: string
      provider:
        label: "商机第一提供人"
        type: string
      handler:
        label: "业务对接人"
        type: string
      opp_type:
        label: "归属部门"
        type: string
      discovery_date:
        label: "发现时间"
        type: date
      second_customer_name:
        label: "第二关联客户"
        type: string
      client_relationship:
        label: "客户关系"
        type: enum
        options:
          - { value: stranger, label: "陌生" }
          - { value: acquaintance, label: "初识" }
          - { value: familiar, label: "熟悉" }
          - { value: deep, label: "深度合作" }
      amount_currency_note:
        label: "外币备注"
        type: string
      planned_sign_date:
        label: "预计签单日期"
        type: date
      actual_sign_date:
        label: "实际签单日期"
        type: date
      competitors:
        label: "竞争厂商"
        type: string
      gross_margin:
        label: "预期毛利率(%)"
        type: number
      customer_requirements:
        label: "客户需求"
        type: text
      lose_reason:
        label: "失败原因"
        type: text
      stage_note:
        label: "阶段备注"
        type: text
      description:
        label: "商机描述"
        type: text
      created_date:
        label: "创建日期"
        type: date
        auto: date
      status_changed_date:
        label: "状态变更日期"
        type: date
        auto: date
      stage_changed_date:
        label: "阶段变更日期"
        type: date
        auto: date

  # ══════════════════════════════════════════════════════════
  # Activity Twins
  # ══════════════════════════════════════════════════════════

  # 跟进记录 — 针对具体商机的沟通互动
  # 关联 opportunity（核心）+ customer + contact
  follow_up:
    label: "跟进记录"
    type: activity
    related_entities:
      - entity: opportunity
        key: opportunity_id
        label: "商机"
      - entity: customer
        key: customer_id
        label: "客户"
      - entity: contact
        key: contact_id
        label: "联系人"
    state_stream:
      mode: versioned
    fields:
      method:
        label: "跟进方式"
        type: enum
        options:
          - { value: visit, label: "上门拜访" }
          - { value: phone, label: "电话" }
          - { value: video, label: "视频会议" }
          - { value: wechat, label: "微信" }
          - { value: email, label: "邮件" }
          - { value: dinner, label: "商务宴请" }
          - { value: other, label: "其他" }
        default_value: phone
      date:
        label: "跟进日期"
        type: date
        required: true
      location:
        label: "地点"
        type: string
      our_attendees:
        label: "我方参与人"
        type: string
      client_attendees:
        label: "客户参与人"
        type: string
      content:
        label: "跟进内容"
        type: text
        required: true
      outcome:
        label: "沟通结果"
        type: text
      next_plan:
        label: "后续计划"
        type: string
      next_plan_date:
        label: "下次跟进日期"
        type: date

  # 开票信息已迁移至 customer_mgmt_schema.yaml → customer_invoice_info（含生效区间、纳税人类型）

  # 商机费用 — 针对具体商机的销售费用
  sales_expense:
    label: "商机费用"
    type: activity
    related_entities:
      - entity: opportunity
        key: opportunity_id
        label: "商机"
    state_stream:
      mode: versioned
    fields:
      expense_type:
        label: "费用类型"
        type: enum
        options:
          - { value: travel, label: "差旅" }
          - { value: entertainment, label: "招待" }
          - { value: gift, label: "礼品" }
          - { value: other, label: "其他" }
      amount:
        label: "金额(万元)"
        type: decimal
      date:
        label: "日期"
        type: date
      description:
        label: "说明"
        type: string
      reimbursed:
        label: "已报销"
        type: enum
        options:
          - { value: "yes", label: "是" }
          - { value: "no", label: "否" }
        default_value: "no"

  # 销售任务 — 针对具体商机的待办任务
  sales_task:
    label: "销售任务"
    type: activity
    related_entities:
      - entity: opportunity
        key: opportunity_id
        label: "商机"
    state_stream:
      mode: versioned
    fields:
      task_title:
        label: "任务标题"
        type: string
        required: true
      assignee:
        label: "负责人"
        type: string
      due_date:
        label: "截止日期"
        type: date
      status:
        label: "状态"
        type: enum
        options:
          - { value: pending, label: "待办" }
          - { value: done, label: "已完成" }
          - { value: cancelled, label: "已取消" }
        default_value: pending
      priority:
        label: "优先级"
        type: enum
        options:
          - { value: high, label: "高" }
          - { value: medium, label: "中" }
          - { value: low, label: "低" }
        default_value: medium
      description:
        label: "说明"
        type: text
