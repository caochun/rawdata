tables:
  project:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      name:
        type: string
        description: 项目名称
        required: true
      project_no:
        type: string
        description: 项目编号
      project_type:
        type: enum
        description: 项目类型
        values:
        - research
        - delivery
        - strategic
        - presale
        - other
      status:
        type: enum
        description: 状态
        values:
        - proposal
        - approved
        - active
        - suspended
        - completed
        - cancelled
      dept:
        type: string
        description: 归属部门
      manager:
        type: string
        description: 项目负责人
      start_date:
        type: datetime
        description: 开始日期
      planned_end_date:
        type: datetime
        description: 计划结束日期
      actual_end_date:
        type: datetime
        description: 实际结束日期
      customer_name:
        type: string
        description: 关联客户
      opportunity_name:
        type: string
        description: 关联商机
      budget_amount:
        type: string
        description: 预算金额(万元)
      cost_total:
        type: string
        description: 成本合计(万元)
      contract_total:
        type: string
        description: 合同回收合计(万元)
      recovery_rate:
        type: string
        description: 回收率(%)
      description:
        type: string
        description: 项目描述
      remark:
        type: string
        description: 备注
      created_date:
        type: datetime
        description: 创建日期
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  project_cost:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      project_id:
        type: uuid
        description: 内部项目
      cost_type:
        type: enum
        description: 成本类型
        values:
        - labor
        - purchase
        - outsource
        - ip
        - travel
        - equipment
        - other
      cost_name:
        type: string
        description: 费用名称
        required: true
      amount:
        type: string
        description: 金额(万元)
        required: true
      supplier_name:
        type: string
        description: 供应商/承担方
      person_name:
        type: string
        description: 相关人员
      date:
        type: datetime
        description: 发生日期
      status:
        type: enum
        description: 状态
        values:
        - planned
        - confirmed
        - paid
      purchase_order_name:
        type: string
        description: 关联采购单
      linked_contract_name:
        type: string
        description: 回收合同
      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  project_review:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      project_id:
        type: uuid
        description: 内部项目
      review_type:
        type: enum
        description: 评审类型
        values:
        - proposal
        - mid_term
        - final
        - special
      review_date:
        type: datetime
        description: 评审日期
        required: true
      reviewers:
        type: string
        description: 评审人员
      result:
        type: enum
        description: 评审结果
        values:
        - pass
        - conditional
        - fail
      opinion:
        type: string
        description: 评审意见
        required: true
      next_action:
        type: string
        description: 后续措施
      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  project_progress:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      project_id:
        type: uuid
        description: 内部项目
      content:
        type: string
        description: 进度内容
        required: true
      milestone:
        type: string
        description: 里程碑名称
      planned_date:
        type: datetime
        description: 计划日期
      actual_date:
        type: datetime
        description: 实际完成日期
      status:
        type: enum
        description: 状态
        values:
        - pending
        - completed
        - delayed
      operator:
        type: string
        description: 记录人
      date:
        type: datetime
        description: 记录日期
      created_at:
        type: datetime
        auto: true
        description: 创建时间
