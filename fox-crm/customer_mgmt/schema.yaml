      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  rfm_score:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      customer_id:
        type: uuid
        description: 客户
      calculated_date:
        type: datetime
        description: 计算日期
        required: true
      last_follow_date:
