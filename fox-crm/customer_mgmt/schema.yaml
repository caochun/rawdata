tables:
  cust_department:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      customer_name:
        type: string
        description: 所属客户
        required: true
      name:
        type: string
        description: 部门名称
        required: true
      parent_dept_name:
        type: string
        description: 上级部门
      dept_level:
        type: enum
        description: 部门层级
        values:
        - '1'
        - '2'
        - '3'
        - '4'
      dept_type:
        type: enum
        description: 部门类型
        values:
        - business
        - tech
        - admin
        - finance
        - purchase
        - quality
        - other
      leader_name:
        type: string
        description: 部门负责人
      leader_title:
        type: string
        description: 负责人职务
      phone:
        type: string
        description: 部门电话
      headcount:
        type: enum
        description: 人员规模
        values:
        - small
        - medium
        - large
        - xlarge
      responsibilities:
        type: string
        description: 部门职责
      position_name:
        type: string
        description: 关键岗位
      position_desc:
        type: string
        description: 岗位描述
      position_permission:
        type: string
        description: 岗位权限/审批权
      status:
        type: enum
        description: 状态
        values:
        - active
        - restructured
        - dissolved
      sort_order:
        type: string
        description: 排序
      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  customer_follow_up:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      customer_id:
        type: uuid
        description: 客户
      contact_id:
        type: uuid
        description: 联系人
      method:
        type: enum
        description: 跟进方式
        values:
        - phone
        - meeting
        - wechat
        - email
        - visit
        - dinner
        - other
      content:
        type: string
        description: 跟进内容
        required: true
      next_plan:
        type: string
        description: 后续计划
      next_plan_date:
        type: datetime
        description: 下次跟进日期
      amount:
        type: string
        description: 合作金额(万元)
      follow_date:
        type: datetime
        description: 跟进日期
      recorder:
        type: string
        description: 记录人
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  contact_job_change:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      contact_id:
        type: uuid
        description: 联系人
      old_department:
        type: string
        description: 原部门
      old_position:
        type: string
        description: 原岗位
      new_department:
        type: string
        description: 新部门
      new_position:
        type: string
        description: 新岗位
      change_date:
        type: datetime
        description: 变动日期
      reason:
        type: enum
        description: 变动原因
        values:
        - promotion
        - transfer
        - career_change
        - demotion
        - other
      info_source:
        type: enum
        description: 信息来源
        values:
        - customer_told
        - announcement
        - other
      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  contact_honor:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      contact_id:
        type: uuid
        description: 联系人
      record_type:
        type: enum
        description: 类型
        values:
        - honor
        - training
      content:
        type: string
        description: 荣誉/培训名称
        required: true
      date:
        type: datetime
        description: 日期
      issuer:
        type: string
        description: 颁发/主办机构
      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  contact_relation:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      contact_id:
        type: uuid
        description: 联系人
      related_contact_id:
        type: uuid
        description: 关联联系人
      relation_type:
        type: enum
        description: 关系类型
        values:
        - classmate
        - relative
        - colleague
        - upstream_downstream
        - other
      description:
        type: string
        description: 关系描述
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  company_financial:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      customer_id:
        type: uuid
        description: 客户
      period:
        type: string
        description: 统计期
        required: true
      contract_amount:
        type: string
        description: 合约金额(万元)
      invoiced_amount:
        type: string
        description: 已开票金额(万元)
      received_amount:
        type: string
        description: 已回款金额(万元)
      first_cooperation_year:
        type: string
