      remark:
        type: string
        description: 备注
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  customer_invoice_info:
    columns:
      id:
        type: uuid
        primary: true
        auto: true
        description: 唯一标识
      customer_id:
        type: uuid
        description: 客户
      invoice_title:
        type: string
        description: 开票抬头
        required: true
      tax_id:
        type: string
        description: 纳税人识别号
        required: true
      bank_name:
        type: string
        description: 开户行
      bank_account:
        type: string
        description: 银行账号
      address:
        type: string
        description: 注册地址
      phone:
        type: string
        description: 开票电话
      vat_type:
        type: enum
        description: 纳税人类型
        values:
        - general
        - small_scale
      effective_from:
        type: datetime
        description: 生效日期
      effective_to:
        type: datetime
        description: 失效日期
      is_current:
        type: enum
        description: 当前使用
        values:
        - 'yes'
        - 'no'
      remark:
        type: string
