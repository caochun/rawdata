      r_score:
        type: string
        description: R-最近一次(1-5)
      f_score:
        type: string
        description: F-频率(1-5)
      m_score:
        type: string
        description: M-金额(1-5)
      total_score:
        type: string
        description: 总分
      level:
        type: enum
        description: 客户等级
        values:
        - high_value
        - active
        - potential
        - lost
        - general
      created_at:
        type: datetime
        auto: true
        description: 创建时间
  company_change_log:
    columns:
      id:
        type: uuid
        primary: true
