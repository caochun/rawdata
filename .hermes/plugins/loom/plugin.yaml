name: loom
version: "0.2.0"
description: "Read and write structured CSV data with Git sync. Use loom_catalog first. Use loom_discover/loom_call to query remote loom A2A agents."
author: loom
provides_tools:
  - loom_catalog
  - loom_query
  - loom_add
  - loom_update
  - loom_delete
  - loom_commit
  - loom_sync
  - loom_conflicts
  - loom_resolve
  - loom_stats
  - loom_join
  - loom_tree
  - loom_validate
  - loom_compute_list
  - loom_compute_run
  - loom_view_list
  - loom_view_query
  - loom_discover
  - loom_call
  - loom_form
